<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sector X - Ticket Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a24;
      --accent: #00D4AA;
      --accent-hover: #00E8BB;
      --text-primary: #ffffff;
      --text-secondary: #8b8b9e;
      --border: #2a2a3a;
      --medic: #FF6B6B;
      --events: #FFE66D;
      --medchip: #4ECDC4;
      --other: #95A5A6;
      --success: #00D4AA;
      --warning: #FFE66D;
      --danger: #FF6B6B;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), #00A080);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #00A080);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav {
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      padding: 10px 18px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-btn:hover, .nav-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg-primary);
    }

    /* Main */
    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
    }

    .stat-card.total .stat-value { color: var(--accent); }
    .stat-card.open .stat-value { color: var(--success); }
    .stat-card.progress .stat-value { color: var(--warning); }
    .stat-card.closed .stat-value { color: var(--text-secondary); }

    /* Filters */
    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 10px 18px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .search-input {
      flex: 1;
      min-width: 250px;
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--accent);
    }

    /* Tickets */
    .tickets-grid {
      display: grid;
      gap: 16px;
    }

    .ticket-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .ticket-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .ticket-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .ticket-id {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
    }

    .ticket-category {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .ticket-category.medic { background: rgba(255,107,107,0.15); color: var(--medic); }
    .ticket-category.events { background: rgba(255,230,109,0.15); color: var(--events); }
    .ticket-category.medchip { background: rgba(78,205,196,0.15); color: var(--medchip); }
    .ticket-category.other { background: rgba(149,165,166,0.15); color: var(--other); }

    .ticket-subject {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .ticket-description {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .ticket-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .ticket-user {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ticket-status {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .ticket-status.open { background: rgba(0,212,170,0.15); color: var(--success); }
    .ticket-status.in_progress { background: rgba(255,230,109,0.15); color: var(--warning); }
    .ticket-status.closed { background: rgba(139,139,158,0.15); color: var(--text-secondary); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
    }

    .modal-close {
      width: 36px;
      height: 36px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      background: var(--danger);
      border-color: var(--danger);
      color: white;
    }

    .modal-body {
      padding: 20px;
    }

    .modal-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .info-item {
      background: var(--bg-card);
      padding: 12px;
      border-radius: 8px;
    }

    .info-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 14px;
      font-weight: 500;
    }

    .description-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .description-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .description-text {
      font-size: 14px;
      line-height: 1.6;
    }

    .messages {
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 20px;
    }

    .message {
      background: var(--bg-card);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .message-author {
      font-weight: 500;
      font-size: 14px;
    }

    .message-time {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .message-ic {
      font-size: 11px;
      padding: 2px 6px;
      background: var(--accent);
      color: var(--bg-primary);
      border-radius: 4px;
      font-weight: 500;
    }

    .message-content {
      font-size: 14px;
      line-height: 1.5;
    }

    .message-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message-input {
      width: 100%;
      padding: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }

    .message-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .message-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .ic-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .ic-toggle input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg-primary);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-secondary {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-text {
      font-size: 16px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
        gap: 16px;
      }
      
      .nav {
        flex-wrap: wrap;
        justify-content: center;
      }
      
      .modal-info {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <div class="logo-icon">🎮</div>
        <span class="logo-text">Sector X</span>
      </div>
      <nav class="nav">
        <button class="nav-btn active" data-filter="all">Alle</button>
        <button class="nav-btn" data-filter="open">Offen</button>
        <button class="nav-btn" data-filter="in_progress">In Bearbeitung</button>
        <button class="nav-btn" data-filter="closed">Geschlossen</button>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="stats" id="stats">
      <div class="stat-card total">
        <div class="stat-label">Gesamt</div>
        <div class="stat-value" id="stat-total">0</div>
      </div>
      <div class="stat-card open">
        <div class="stat-label">Offen</div>
        <div class="stat-value" id="stat-open">0</div>
      </div>
      <div class="stat-card progress">
        <div class="stat-label">In Bearbeitung</div>
        <div class="stat-value" id="stat-progress">0</div>
      </div>
      <div class="stat-card closed">
        <div class="stat-label">Geschlossen</div>
        <div class="stat-value" id="stat-closed">0</div>
      </div>
    </div>

    <div class="filters">
      <input type="text" class="search-input" id="search" placeholder="Ticket suchen...">
    </div>

    <div class="tickets-grid" id="tickets">
      <div class="loading">Lädt...</div>
    </div>
  </main>

  <!-- Ticket Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Ticket #</h2>
        <button class="modal-close" id="modal-close">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-info">
          <div class="info-item">
            <div class="info-label">Kategorie</div>
            <div class="info-value" id="modal-category">-</div>
          </div>
          <div class="info-item">
            <div class="info-label">Status</div>
            <div class="info-value" id="modal-status">-</div>
          </div>
          <div class="info-item">
            <div class="info-label">Erstellt von</div>
            <div class="info-value" id="modal-user">-</div>
          </div>
          <div class="info-item">
            <div class="info-label">Erstellt am</div>
            <div class="info-value" id="modal-date">-</div>
          </div>
        </div>

        <div class="description-box">
          <div class="description-label">Beschreibung</div>
          <div class="description-text" id="modal-description">-</div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="message-form" id="message-form">
          <textarea class="message-input" id="message-input" placeholder="Nachricht eingeben..."></textarea>
          <div class="message-actions">
            <label class="ic-toggle">
              <input type="checkbox" id="is-ic">
              IC-Nachricht
            </label>
            <button class="btn btn-primary" id="send-message">Senden</button>
            <button class="btn btn-secondary" id="claim-ticket">Übernehmen</button>
            <button class="btn btn-danger" id="close-ticket">Schließen</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.hostname === 'localhost' 
      ? 'http://localhost:3001' 
      : '';

    let currentFilter = 'all';
    let currentTicket = null;

    // Fetch stats
    async function fetchStats() {
      try {
        const res = await fetch(`${API_URL}/api/stats`);
        const data = await res.json();
        
        document.getElementById('stat-total').textContent = data.total;
        document.getElementById('stat-open').textContent = data.open;
        document.getElementById('stat-progress').textContent = data.inProgress;
        document.getElementById('stat-closed').textContent = data.closed;
      } catch (error) {
        console.error('Stats error:', error);
      }
    }

    // Fetch tickets
    async function fetchTickets() {
      const container = document.getElementById('tickets');
      container.innerHTML = '<div class="loading">Lädt...</div>';

      try {
        const url = currentFilter === 'all' 
          ? `${API_URL}/api/tickets` 
          : `${API_URL}/api/tickets?status=${currentFilter}`;
        
        const res = await fetch(url);
        let tickets = await res.json();

        // Search filter
        const search = document.getElementById('search').value.toLowerCase();
        if (search) {
          tickets = tickets.filter(t => 
            t.ticket_id.toLowerCase().includes(search) ||
            t.subject?.toLowerCase().includes(search) ||
            t.username?.toLowerCase().includes(search)
          );
        }

        if (tickets.length === 0) {
          container.innerHTML = `
            <div class="empty">
              <div class="empty-icon">🎫</div>
              <div class="empty-text">Keine Tickets gefunden</div>
            </div>
          `;
          return;
        }

        container.innerHTML = tickets.map(ticket => `
          <div class="ticket-card" data-id="${ticket.ticket_id}">
            <div class="ticket-header">
              <span class="ticket-id">#${ticket.ticket_id}</span>
              <span class="ticket-category ${ticket.category}">${getCategoryEmoji(ticket.category)} ${getCategoryName(ticket.category)}</span>
            </div>
            <div class="ticket-subject">${ticket.subject || 'Kein Betreff'}</div>
            <div class="ticket-description">${ticket.description}</div>
            <div class="ticket-footer">
              <span class="ticket-user">👤 ${ticket.username}</span>
              <span class="ticket-status ${ticket.status}">${getStatusText(ticket.status)}</span>
            </div>
          </div>
        `).join('');

        // Add click handlers
        container.querySelectorAll('.ticket-card').forEach(card => {
          card.addEventListener('click', () => openTicket(card.dataset.id));
        });
      } catch (error) {
        console.error('Tickets error:', error);
        container.innerHTML = '<div class="empty">Fehler beim Laden</div>';
      }
    }

    // Get category info
    function getCategoryEmoji(category) {
      const emojis = { medic: '🏥', events: '🎪', medchip: '💉', other: '📝' };
      return emojis[category] || '📝';
    }

    function getCategoryName(category) {
      const names = { medic: 'Medic', events: 'Events', medchip: 'Med-Chip', other: 'Sonstiges' };
      return names[category] || category;
    }

    function getStatusText(status) {
      const texts = { open: '🟢 Offen', in_progress: '🟡 In Bearbeitung', closed: '🔴 Geschlossen' };
      return texts[status] || status;
    }

    // Open ticket modal
    async function openTicket(ticketId) {
      currentTicket = ticketId;
      const modal = document.getElementById('modal');

      try {
        const res = await fetch(`${API_URL}/api/tickets/${ticketId}`);
        const ticket = await res.json();

        document.getElementById('modal-title').textContent = `Ticket #${ticket.ticket_id}`;
        document.getElementById('modal-category').innerHTML = `${getCategoryEmoji(ticket.category)} ${getCategoryName(ticket.category)}`;
        document.getElementById('modal-status').textContent = getStatusText(ticket.status);
        document.getElementById('modal-user').textContent = ticket.username;
        document.getElementById('modal-date').textContent = new Date(ticket.created_at).toLocaleString('de-DE');
        document.getElementById('modal-description').textContent = ticket.description;

        // Render messages
        const messagesContainer = document.getElementById('messages');
        if (ticket.messages && ticket.messages.length > 0) {
          messagesContainer.innerHTML = ticket.messages.map(msg => `
            <div class="message">
              <div class="message-header">
                <span class="message-author">${msg.author_name}</span>
                <span class="message-time">${new Date(msg.created_at).toLocaleString('de-DE')}</span>
                ${msg.is_ic ? '<span class="message-ic">IC</span>' : ''}
              </div>
              <div class="message-content">${msg.content}</div>
            </div>
          `).join('');
        } else {
          messagesContainer.innerHTML = '<div class="empty">Keine Nachrichten</div>';
        }

        modal.classList.add('open');
      } catch (error) {
        console.error('Open ticket error:', error);
      }
    }

    // Close modal
    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      currentTicket = null;
    }

    // Send message
    async function sendMessage() {
      const input = document.getElementById('message-input');
      const isIc = document.getElementById('is-ic').checked;
      const content = input.value.trim();

      if (!content || !currentTicket) return;

      try {
        await fetch(`${API_URL}/api/tickets/${currentTicket}/messages`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            author_id: 'web-dashboard',
            author_name: 'Dashboard',
            content,
            is_ic: isIc
          })
        });

        input.value = '';
        document.getElementById('is-ic').checked = false;
        openTicket(currentTicket); // Refresh
      } catch (error) {
        console.error('Send message error:', error);
      }
    }

    // Claim ticket
    async function claimTicket() {
      if (!currentTicket) return;

      try {
        await fetch(`${API_URL}/api/tickets/${currentTicket}/status`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: 'in_progress' })
        });

        fetchTickets();
        openTicket(currentTicket);
      } catch (error) {
        console.error('Claim error:', error);
      }
    }

    // Close ticket
    async function closeTicket() {
      if (!currentTicket) return;

      try {
        await fetch(`${API_URL}/api/tickets/${currentTicket}/status`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: 'closed', closed_by: 'dashboard' })
        });

        closeModal();
        fetchTickets();
        fetchStats();
      } catch (error) {
        console.error('Close error:', error);
      }
    }

    // Event listeners
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });

    document.getElementById('send-message').addEventListener('click', sendMessage);
    document.getElementById('claim-ticket').addEventListener('click', claimTicket);
    document.getElementById('close-ticket').addEventListener('click', closeTicket);

    document.getElementById('search').addEventListener('input', fetchTickets);

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        fetchTickets();
      });
    });

    // Initialize
    fetchStats();
    fetchTickets();
  </script>
</body>
</html>
